name: Package Application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - arch: x64
            os: macos-15-intel
          - arch: arm64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and Package macOS
        run: |
          chmod +x scripts/build_macos.sh
          ./scripts/build_macos.sh

      - name: Archive macOS App
        run: |
          cd target/dist
          zip -r Vibethema-macOS-${{ matrix.arch }}.zip Vibethema.app

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Vibethema-macOS-${{ matrix.arch }}
          path: target/dist/Vibethema-macOS-${{ matrix.arch }}.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Install WiX
        run: dotnet tool install --global wix

      - name: Build and Package Windows
        shell: pwsh
        run: |
          ./scripts/build_app_win.ps1

      - name: Archive Windows App
        shell: pwsh
        run: Compress-Archive -Path target/dist/Vibethema -DestinationPath target/dist/Vibethema-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Vibethema-Windows
          path: target/dist/Vibethema-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and Package Linux
        run: |
          chmod +x scripts/build_linux.sh
          ./scripts/build_linux.sh

      - name: Archive Linux App
        run: tar -czf target/dist/Vibethema-Linux.tar.gz -C target/dist Vibethema

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Vibethema-Linux
          path: target/dist/Vibethema-Linux.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions: 
      contents: write 

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-${{ github.run_attempt }}
          name: "Release v${{ github.run_number }}-${{ github.run_attempt }}"
          body: |
            Automated build from CI
            - macOS
            - Windows
            - Linux
          draft: false
          prerelease: false
          files: |
            release-assets/Vibethema-macOS-x64/Vibethema-macOS-x64.zip
            release-assets/Vibethema-macOS-arm64/Vibethema-macOS-arm64.zip
            release-assets/Vibethema-Windows/Vibethema-Windows.zip
            release-assets/Vibethema-Linux/Vibethema-Linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
