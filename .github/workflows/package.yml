name: Package Application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - arch: x64
            os: macos-15-intel
          - arch: arm64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and Package macOS
        run: |
          chmod +x scripts/build_macos.sh
          ./scripts/build_macos.sh

      - name: Prepare DMG Artifact
        run: |
          cd target/dist
          mv Vibethema*.dmg Vibethema-macOS-${{ matrix.arch }}.dmg

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Vibethema-macOS-${{ matrix.arch }}
          path: target/dist/Vibethema-macOS-${{ matrix.arch }}.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven


      - name: Build and Package Windows
        shell: pwsh
        run: |
          ./scripts/build_app_win.ps1


      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Vibethema-Windows-MSI
          path: target/dist/*.msi

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          # Download appimagetool from the official repository
          curl -Lf -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Build and Package Linux
        run: |
          chmod +x scripts/build_linux.sh
          ./scripts/build_linux.sh
          
          # Complete AppImage creation
          # The script created the AppDir structure at target/dist/AppDir-Base/Vibethema
          APP_DIR="target/dist/AppDir-Base/Vibethema"
          # AppImage needs AppRun, icon, and desktop file in root
          cp src/main/resources/icon.png "$APP_DIR/vibethema.png"
          
          # Create simple desktop file if jpackage didn't
          cat <<EOF > "$APP_DIR/vibethema.desktop"
          [Desktop Entry]
          Type=Application
          Name=Vibethema
          Icon=vibethema
          Exec=bin/Vibethema
          Categories=Utility;
          EOF

          # Create AppRun script
          cat <<EOF > "$APP_DIR/AppRun"
          #!/bin/sh
          SELF=\$(readlink -f "\$0")
          HERE=\$(dirname "\$SELF")
          exec "\$HERE/bin/Vibethema" "\$@"
          EOF
          chmod +x "$APP_DIR/AppRun"
          
          export ARCH=x86_64
          export APPIMAGE_EXTRACT_AND_RUN=1
          ./appimagetool --appimage-extract-and-run "$APP_DIR" target/dist/Vibethema-x86_64.AppImage

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Vibethema-Linux-Packages
          path: |
            target/dist/*.deb
            target/dist/*.rpm
            target/dist/*.AppImage

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions: 
      contents: write 

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-${{ github.run_attempt }}
          name: "Release v${{ github.run_number }}-${{ github.run_attempt }}"
          body: |
            Automated build from CI
            - macOS
            - Windows
            - Linux
          draft: false
          prerelease: false
          files: |
            release-assets/Vibethema-macOS-x64/Vibethema-macOS-x64.dmg
            release-assets/Vibethema-macOS-arm64/Vibethema-macOS-arm64.dmg
            release-assets/Vibethema-Windows-MSI/*.msi
            release-assets/Vibethema-Linux-Packages/*.deb
            release-assets/Vibethema-Linux-Packages/*.rpm
            release-assets/Vibethema-Linux-Packages/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
